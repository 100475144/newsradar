# SonarQube basic project configuration
sonar.organization=100475144
sonar.projectKey=100475144_newsradar
sonar.projectName=NEWSRADAR
sonar.sourceEncoding=UTF-8
sonar.python.version=3.11

# Sources (production code only). Tests live under sonar.tests below and
# must NOT overlap, otherwise Sonar refuses to index a file twice.
sonar.sources=backend/app,frontend/src

# Tests (separate from sources).
sonar.tests=backend/app/tests

# Exclusions: artefactos del build / venv / node_modules + smoke tests del
# frontend que viven dentro de ``frontend/src/pages`` (mismas carpetas que
# código de producción) — los excluimos del análisis para no duplicarlos.
sonar.exclusions=**/node_modules/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/dist/**,**/*.test.jsx,**/*.test.js,frontend/src/test/**,backend/app/tests/**

# Coverage report ignored for test files themselves.
sonar.coverage.exclusions=**/tests/**,**/*.test.jsx,**/*.test.js

sonar.python.coverage.reportPaths=./backend/coverage.xml