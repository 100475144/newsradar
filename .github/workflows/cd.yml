name: CD

on:
  push:
    branches:
      - main
      - fix/slow_tests
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job intermedio: evalúa qué secrets están definidos y expone flags
  # como outputs. Es el patrón estándar para condicionar otros jobs
  # con secrets, porque GitHub Actions NO permite ``secrets.*`` en
  # ``if`` a nivel de job (solo en steps / env / with / run).
  # ──────────────────────────────────────────────────────────────────
  check-secrets:
    name: Check available secrets
    runs-on: ubuntu-latest
    outputs:
      has_docker: ${{ steps.check.outputs.has_docker }}
      has_deploy: ${{ steps.check.outputs.has_deploy }}
    steps:
      - id: check
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "has_docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docker=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$SSH_PRIVATE_KEY" ] && [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ]; then
            echo "has_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────────────
  # Build + push de imágenes Docker. Solo se ejecuta si están definidos
  # los secrets de Docker Hub (DOCKER_USERNAME / DOCKER_PASSWORD).
  # ──────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has_docker == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/newsradar-backend:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/newsradar-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/newsradar-frontend:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/newsradar-frontend:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────
  # Deploy SSH opcional. Solo se ejecuta si están los secrets SSH.
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to remote server (optional)
    runs-on: ubuntu-latest
    needs: [check-secrets, build-and-push]
    if: needs.check-secrets.outputs.has_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run remote deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME}"
            if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
              docker compose pull || true
              docker compose up -d --build
            else
              echo "No docker-compose.yml found in target path"
            fi

  # ──────────────────────────────────────────────────────────────────
  # Aviso explícito si no hay secrets configurados, para que el run
  # no quede simplemente "skipped" sin contexto.
  # ──────────────────────────────────────────────────────────────────
  notify-missing-secrets:
    name: Notify Missing Deploy Secrets
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has_docker == 'false' || needs.check-secrets.outputs.has_deploy == 'false'
    steps:
      - name: Warn about missing secrets
        run: |
          echo "::warning ::Some CD secrets are not configured."
          echo "  has_docker: ${{ needs.check-secrets.outputs.has_docker }}"
          echo "  has_deploy: ${{ needs.check-secrets.outputs.has_deploy }}"
          echo "Configure DOCKER_USERNAME, DOCKER_PASSWORD for image push."
          echo "Configure SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_USER for remote deploy."
