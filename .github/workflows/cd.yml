name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        if: secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/newsradar-backend:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/newsradar-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/newsradar-frontend:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/newsradar-frontend:${{ github.sha }}

  deploy:
    name: Deploy to remote server (optional)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.SSH_PRIVATE_KEY != '' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run remote deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd ${DEPLOY_PATH:-$HOME}
            # Pull latest images and recreate containers
            if [ -f docker-compose.yml ]; then
              docker compose pull || true
              docker compose up -d --build
            else
              echo "No docker-compose.yml found in target path"
            fi

  notify-missing-secrets:
    name: Notify Missing Deploy Secrets
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.SSH_PRIVATE_KEY == '' || secrets.DEPLOY_HOST == '' || secrets.DEPLOY_USER == '' }}
    steps:
      - name: Warn about missing deploy secrets
        run: |
          echo "Deploy secrets are not configured; skipping remote deploy."
