name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: newsradar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d newsradar_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025
    env:
      DATABASE_URL: postgresql+psycopg://user:password@localhost:5432/newsradar_test
      MAILHOG_API_URL: http://localhost:8025/api/v2/messages
      # MailHog SMTP (servicio levantado arriba en :1025).
      # Sin estas variables, send_email_notification() corta y el test
      # ``test_alert_email_notification`` falla esperando un email que nunca llega.
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_SENDER: no-reply@newsradar.local
      SMTP_USE_TLS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          pytest app/tests -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/coverage_html
          retention-days: 14

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint backend
        run: ruff check backend/app/

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        # Usamos `npm install` en lugar de `npm ci` para que el job no
        # falle cuando se añaden dependencias nuevas a package.json sin
        # haber regenerado el lockfile (común en PRs de features).
        run: npm install --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        # Usamos `npm install` en lugar de `npm ci` para que el job no
        # falle cuando se añaden dependencias nuevas a package.json sin
        # haber regenerado el lockfile (común en PRs de features).
        run: npm install --no-audit --no-fund

      - name: Run frontend tests
        working-directory: frontend
        run: |
          if npm run | grep -qE "^\s+test\b"; then
            npm test
          else
            echo "No frontend test script found yet. Skipping."
          fi

  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (required by sonar-scanner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download sonar-scanner
        run: |
          curl -sSLo sonar-scanner-cli.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
          unzip -q sonar-scanner-cli.zip -d .
          mv sonar-scanner-*/ sonar-scanner

      - name: Run sonar-scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./sonar-scanner/bin/sonar-scanner \
            -Dsonar.projectKey=newsradar \
            -Dsonar.sources=. \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.login=${SONAR_TOKEN} \
            -Dsonar.python.version=3.11
